apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "helm-harbor-sync.fullname" . }}-nginx-confd
  labels:
    {{- include "helm-harbor-sync.labels" . | nindent 4 }}
data:
  yum.conf: |
    # yum.{{ .Values.domain }} — RPM repository proxy (Rocky 9, EPEL, RKE2)
    server {
        listen 8080;
        server_name yum.{{ .Values.domain }};

        # --- Rocky Linux 9 repos ---
        # BaseOS, AppStream, extras, CRB, plus
        location /rocky/9/ {
            proxy_pass https://dl.rockylinux.org/pub/rocky/9/;
            include /etc/nginx/includes/proxy-defaults.conf;
            proxy_cache rpm_cache;
            proxy_cache_valid 200 7d;
            proxy_cache_valid 404 1m;
            proxy_cache_use_stale error timeout updating;
            add_header X-Cache-Status $upstream_cache_status;
        }

        # --- EPEL 9 ---
        location /epel/9/ {
            proxy_pass https://dl.fedoraproject.org/pub/epel/9/;
            include /etc/nginx/includes/proxy-defaults.conf;
            proxy_cache rpm_cache;
            proxy_cache_valid 200 7d;
            proxy_cache_valid 404 1m;
            proxy_cache_use_stale error timeout updating;
            add_header X-Cache-Status $upstream_cache_status;
        }

        # EPEL GPG key
        location = /epel/RPM-GPG-KEY-EPEL-9 {
            proxy_pass https://dl.fedoraproject.org/pub/epel/RPM-GPG-KEY-EPEL-9;
            include /etc/nginx/includes/proxy-defaults.conf;
            proxy_cache rpm_cache;
            proxy_cache_valid 200 30d;
            add_header X-Cache-Status $upstream_cache_status;
        }

        # --- RKE2 repos ---
        # Common (rke2-selinux, etc.)
        location /rke2/latest/common/ {
            proxy_pass https://rpm.rancher.io/rke2/latest/common/;
            include /etc/nginx/includes/proxy-defaults.conf;
            proxy_cache rpm_cache;
            proxy_cache_valid 200 7d;
            proxy_cache_valid 404 1m;
            proxy_cache_use_stale error timeout updating;
            add_header X-Cache-Status $upstream_cache_status;
        }

        # RKE2 versioned (1.34)
        location /rke2/latest/1.34/ {
            proxy_pass https://rpm.rancher.io/rke2/latest/1.34/;
            include /etc/nginx/includes/proxy-defaults.conf;
            proxy_cache rpm_cache;
            proxy_cache_valid 200 7d;
            proxy_cache_valid 404 1m;
            proxy_cache_use_stale error timeout updating;
            add_header X-Cache-Status $upstream_cache_status;
        }

        # RKE2 GPG key
        location = /rke2/public.key {
            proxy_pass https://rpm.rancher.io/public.key;
            include /etc/nginx/includes/proxy-defaults.conf;
            proxy_cache rpm_cache;
            proxy_cache_valid 200 30d;
            add_header X-Cache-Status $upstream_cache_status;
        }
    }
  apt.conf: |
    # apt.{{ .Values.domain }} — Debian/Ubuntu APT repository proxy
    server {
        listen 8080;
        server_name apt.{{ .Values.domain }};

        # --- Debian ---
        location /debian/ {
            proxy_pass https://deb.debian.org/debian/;
            include /etc/nginx/includes/proxy-defaults.conf;
            proxy_cache rpm_cache;
            proxy_cache_valid 200 7d;
            proxy_cache_valid 404 1m;
            proxy_cache_use_stale error timeout updating;
            add_header X-Cache-Status $upstream_cache_status;
        }

        location /debian-security/ {
            proxy_pass https://security.debian.org/debian-security/;
            include /etc/nginx/includes/proxy-defaults.conf;
            proxy_cache rpm_cache;
            proxy_cache_valid 200 7d;
            proxy_cache_valid 404 1m;
            proxy_cache_use_stale error timeout updating;
            add_header X-Cache-Status $upstream_cache_status;
        }

        # --- Ubuntu ---
        location /ubuntu/ {
            proxy_pass https://archive.ubuntu.com/ubuntu/;
            include /etc/nginx/includes/proxy-defaults.conf;
            proxy_cache rpm_cache;
            proxy_cache_valid 200 7d;
            proxy_cache_valid 404 1m;
            proxy_cache_use_stale error timeout updating;
            add_header X-Cache-Status $upstream_cache_status;
        }

        location /ubuntu-security/ {
            proxy_pass https://security.ubuntu.com/ubuntu/;
            include /etc/nginx/includes/proxy-defaults.conf;
            proxy_cache rpm_cache;
            proxy_cache_valid 200 7d;
            proxy_cache_valid 404 1m;
            proxy_cache_use_stale error timeout updating;
            add_header X-Cache-Status $upstream_cache_status;
        }
    }
  dl.conf: |
    # dl.{{ .Values.domain }} — Cloud images and ISO proxy
    server {
        listen 8080;
        server_name dl.{{ .Values.domain }};

        # Rocky 9 cloud images (qcow2) and ISOs
        location /rocky/9/ {
            proxy_pass https://dl.rockylinux.org/pub/rocky/9/;
            include /etc/nginx/includes/proxy-defaults.conf;
            proxy_cache downloads_cache;
            proxy_cache_valid 200 30d;
            proxy_cache_valid 404 1m;
            proxy_cache_use_stale error timeout updating;
            add_header X-Cache-Status $upstream_cache_status;

            # Allow large files (qcow2 images can be 1-2GB)
            proxy_max_temp_file_size 4096m;
        }
    }
  charts.conf: |
    # charts.{{ .Values.domain }} — Helm HTTP repository proxy
    server {
        listen 8080;
        server_name charts.{{ .Values.domain }};

        # Internal mirror endpoint — fire-and-forget to helm-sync sidecar
        set $helm_sync_upstream http://localhost:8888;
        location = /mirror-sync {
            internal;
            proxy_pass $helm_sync_upstream/sync;
            proxy_set_header X-Original-URI $request_uri;
            proxy_connect_timeout 1s;
            proxy_read_timeout 1s;
            proxy_send_timeout 1s;
        }
    {{- range .Values.charts }}

        # {{ .name }}
        location {{ .locationPath }} {
            mirror /mirror-sync;
            mirror_request_body off;
            proxy_pass {{ .source | trimSuffix "/" }}/;
            include /etc/nginx/includes/proxy-defaults.conf;
            proxy_cache charts_cache;
            proxy_cache_valid 200 1d;
            proxy_cache_valid 404 1m;
            proxy_cache_use_stale error timeout updating;
            add_header X-Cache-Status $upstream_cache_status;
        }
    {{- end }}
    }
  bin.conf: |
    # bin.{{ .Values.domain }} — Static binary file server
    server {
        listen 8080;
        server_name bin.{{ .Values.domain }};

        root /srv/bin;
        autoindex off;

        location / {
            try_files $uri =404;

            # Binary files — cache indefinitely in client
            add_header Cache-Control "public, max-age=86400, immutable";
        }
    }
