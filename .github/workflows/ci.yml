name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  shellcheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: ShellCheck
        uses: ludeeus/action-shellcheck@2.0.0
        with:
          scandir: .
          severity: warning
          additional_files: ""
        env:
          SHELLCHECK_OPTS: "-e SC1090 -e SC1091"

  hadolint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Hadolint
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: helm-sync/Dockerfile

  yamllint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: yamllint
        uses: ibiqlik/action-yamllint@v3
        with:
          file_or_dir: docker-compose.yaml registry/config.yml
          config_data: |
            extends: default
            rules:
              line-length:
                max: 200
              truthy:
                check-keys: false

  nginx-config:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate nginx config
        run: |
          mkdir -p /tmp/certs
          openssl req -x509 -newkey ec -pkeyopt ec_paramgen_curve:prime256v1 \
            -keyout /tmp/certs/server-key.pem -out /tmp/certs/server-fullchain.pem \
            -days 1 -nodes -subj '/CN=test'

          docker run --rm \
            -v "$PWD/nginx/nginx.conf:/etc/nginx/nginx.conf:ro" \
            -v "$PWD/nginx/conf.d:/etc/nginx/conf.d:ro" \
            -v "$PWD/nginx/includes:/etc/nginx/includes:ro" \
            -v "/tmp/certs/server-fullchain.pem:/etc/nginx/certs/server-fullchain.pem:ro" \
            -v "/tmp/certs/server-key.pem:/etc/nginx/certs/server-key.pem:ro" \
            nginx:1.27-alpine nginx -t

  docker-compose:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate docker-compose
        env:
          HARBOR_HOST: harbor.example.com
          HARBOR_USER: ci-test
          HARBOR_PASS: ci-test
        run: docker compose config --quiet

  helm-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Helm
        uses: azure/setup-helm@v4

      - name: Helm lint
        run: helm lint chart/

      - name: Helm template
        run: helm template test chart/ > /dev/null

  secrets-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
